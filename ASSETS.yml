schema: 1
project: MARISHOKU/OS
policy:
  allowed:
    - original
    - CC0-1.0
    - CC-BY-4.0
    - CC-BY-SA-4.0
    - OFL-1.1
    - GPL-compatible-software-assets
    - Pexels-License
    - Pexels-License-and-public-domain
    - Pexels-License-and-CC-BY-SA-4.0
    - public-domain
  require_adult_subjects_for_explicit_content: true
assets:
  - id: brand-mark-v0.1
    path: artwork/source/brand-mark.svg
    type: vector-brand-source
    origin: original
    author: MARISHOKU/OS Project
    license: CC-BY-SA-4.0
    distributable: true
  - id: desktop-concept-v0.1
    path: artwork/concepts/desktop-v0.1.png
    type: ui-concept
    origin: original-ai-assisted-generation
    author: MARISHOKU/OS Project
    license: CC-BY-SA-4.0
    distributable: true
    notes: >-
      Generated with the built-in OpenAI image tool using the owner's four
      supplied images as mood references only. The owner approved this original
      concept as distributable project artwork and as the exact Phase 1D target.
  - id: kvantum-marishoku-v0.1
    path: themes/kvantum/MARISHOKU/MARISHOKU.svg
    type: qt-control-atlas
    origin: original
    author: MARISHOKU/OS Project
    license: GPL-3.0-or-later
    distributable: true
    notes: >-
      Built from original square-edged vector primitives. Upstream Kvantum
      documentation and element naming were used as an implementation schema;
      no upstream theme artwork is included.
  - id: wallpaper-marishoku-night-line-v0.4
    path: artwork/wallpapers/MARISHOKU-NightLine/contents/images/1920x1080.png
    type: transformed-wallpaper-composite
    origin: original-composite-with-licensed-stock
    author: MARISHOKU/OS Project; Trev W. Adams; Mikhail Nilov
    license: Pexels-License-and-public-domain
    subject_age_review: clearly-adult-as-described-by-source
    distributable: true
    notes: >-
      Includes transformed material from Trev W. Adams' rainy London photo
      (https://www.pexels.com/photo/london-rainy-27585636/), Mikhail Nilov's
      adult woman portrait (https://www.pexels.com/photo/woman-wearing-black-jacket-8107857/),
      and the public-domain Great Wave off Kanagawa
      (https://commons.wikimedia.org/wiki/File:The_Great_Wave_off_Kanagawa.jpg).
      Original bus, roundel, blossoms, labels, palette reduction, rain, and CRT
      treatment were drawn by the MARISHOKU/OS Project. Untouched stock files
      are not redistributed.
  - id: wallpaper-marishoku-neon-velvet-v0.4
    path: artwork/wallpapers/MARISHOKU-NeonVelvet/contents/images/1920x1080.png
    type: transformed-wallpaper-composite
    origin: original-composite-with-licensed-stock
    author: MARISHOKU/OS Project; Trev W. Adams; Vika Glitter
    license: Pexels-License-and-public-domain
    subject_age_review: clearly-adult-as-described-by-source
    distributable: true
    notes: >-
      Includes transformed material from Trev W. Adams' rainy London photo
      (https://www.pexels.com/photo/london-rainy-27585636/), Vika Glitter's
      adult woman portrait
      (https://www.pexels.com/photo/neon-lit-portrait-of-woman-in-futuristic-attire-33034133/),
      and the public-domain Great Wave off Kanagawa
      (https://commons.wikimedia.org/wiki/File:The_Great_Wave_off_Kanagawa.jpg).
      Original bus, roundel, blossoms, labels, palette reduction, rain, and CRT
      treatment were drawn by the MARISHOKU/OS Project. Untouched stock files
      are not redistributed.
  - id: wallpaper-marishoku-ura-v0.5
    path: artwork/wallpapers/MARISHOKU-URA/contents/images/1920x1080.png
    type: transformed-wallpaper-composite
    origin: approved-project-concept-with-licensed-stock
    author: MARISHOKU/OS Project; Trev W. Adams
    license: Pexels-License-and-CC-BY-SA-4.0
    subject_age_review: stylized-adult-character-approved-by-owner
    distributable: true
    notes: >-
      Uses the clean character/signage crop from the approved project-owned
      desktop concept and rebuilds the obscured left side from Trev W. Adams'
      rainy London photograph
      (https://www.pexels.com/photo/london-rainy-27585636/). The build is a
      deterministic Pillow composite and uses no generative image model.
