<svg xmlns="http://www.w3.org/2000/svg" width="192" height="48" viewBox="0 0 192 48">
  <!-- Normal: pale raised Win9x frame. -->
  <g id="normal-topleft"><rect width="4" height="4" fill="#080812"/><path d="M1 4V1h3" fill="none" stroke="#f6f4fa"/><rect x="2" y="2" width="2" height="2" fill="#c0c0ca"/></g>
  <g id="normal-top"><rect x="4" width="40" height="4" fill="#080812"/><rect x="4" y="1" width="40" height="1" fill="#f6f4fa"/><rect x="4" y="2" width="40" height="2" fill="#c0c0ca"/></g>
  <g id="normal-topright"><rect x="44" width="4" height="4" fill="#080812"/><path d="M44 1h3v3" fill="none" stroke="#f6f4fa"/><rect x="44" y="2" width="2" height="2" fill="#c0c0ca"/></g>
  <g id="normal-left"><rect y="4" width="4" height="40" fill="#080812"/><rect x="1" y="4" width="1" height="40" fill="#f6f4fa"/><rect x="2" y="4" width="2" height="40" fill="#c0c0ca"/></g>
  <rect id="normal-center" x="4" y="4" width="40" height="40" fill="#c0c0ca"/>
  <g id="normal-right"><rect x="44" y="4" width="4" height="40" fill="#080812"/><rect x="44" y="4" width="2" height="40" fill="#8a8a98"/><rect x="46" y="4" width="1" height="40" fill="#404050"/></g>
  <g id="normal-bottomleft"><rect y="44" width="4" height="4" fill="#080812"/><rect x="2" y="44" width="2" height="2" fill="#8a8a98"/></g>
  <g id="normal-bottom"><rect x="4" y="44" width="40" height="4" fill="#080812"/><rect x="4" y="44" width="40" height="2" fill="#8a8a98"/><rect x="4" y="46" width="40" height="1" fill="#404050"/></g>
  <g id="normal-bottomright"><rect x="44" y="44" width="4" height="4" fill="#080812"/><rect x="44" y="44" width="2" height="2" fill="#8a8a98"/></g>

  <!-- Hover: hot-pink top/left signal with the same readable face. -->
  <g id="hover-topleft"><rect x="48" width="4" height="4" fill="#080812"/><path d="M49 4V1h3" fill="none" stroke="#ff2c9d"/><rect x="50" y="2" width="2" height="2" fill="#f6f4fa"/></g>
  <g id="hover-top"><rect x="52" width="40" height="4" fill="#080812"/><rect x="52" y="1" width="40" height="1" fill="#ff2c9d"/><rect x="52" y="2" width="40" height="2" fill="#f6f4fa"/></g>
  <g id="hover-topright"><rect x="92" width="4" height="4" fill="#080812"/><path d="M92 1h3v3" fill="none" stroke="#ff2c9d"/><rect x="92" y="2" width="2" height="2" fill="#f6f4fa"/></g>
  <g id="hover-left"><rect x="48" y="4" width="4" height="40" fill="#080812"/><rect x="49" y="4" width="1" height="40" fill="#ff2c9d"/><rect x="50" y="4" width="2" height="40" fill="#f6f4fa"/></g>
  <rect id="hover-center" x="52" y="4" width="40" height="40" fill="#f6f4fa"/>
  <g id="hover-right"><rect x="92" y="4" width="4" height="40" fill="#080812"/><rect x="92" y="4" width="2" height="40" fill="#ff2c9d"/></g>
  <g id="hover-bottomleft"><rect x="48" y="44" width="4" height="4" fill="#080812"/><rect x="50" y="44" width="2" height="2" fill="#000080"/></g>
  <g id="hover-bottom"><rect x="52" y="44" width="40" height="4" fill="#080812"/><rect x="52" y="44" width="40" height="2" fill="#000080"/></g>
  <g id="hover-bottomright"><rect x="92" y="44" width="4" height="4" fill="#080812"/><rect x="92" y="44" width="2" height="2" fill="#000080"/></g>

  <!-- Pressed: recessed face. -->
  <g id="pressed-topleft"><rect x="96" width="4" height="4" fill="#080812"/><path d="M97 4V1h3" fill="none" stroke="#404050"/><rect x="98" y="2" width="2" height="2" fill="#b0b0ba"/></g>
  <g id="pressed-top"><rect x="100" width="40" height="4" fill="#080812"/><rect x="100" y="1" width="40" height="1" fill="#404050"/><rect x="100" y="2" width="40" height="2" fill="#8a8a98"/></g>
  <g id="pressed-topright"><rect x="140" width="4" height="4" fill="#080812"/><rect x="140" y="2" width="2" height="2" fill="#b0b0ba"/></g>
  <g id="pressed-left"><rect x="96" y="4" width="4" height="40" fill="#080812"/><rect x="97" y="4" width="1" height="40" fill="#404050"/><rect x="98" y="4" width="2" height="40" fill="#8a8a98"/></g>
  <rect id="pressed-center" x="100" y="4" width="40" height="40" fill="#b0b0ba"/>
  <g id="pressed-right"><rect x="140" y="4" width="4" height="40" fill="#080812"/><rect x="140" y="4" width="2" height="40" fill="#f6f4fa"/></g>
  <g id="pressed-bottomleft"><rect x="96" y="44" width="4" height="4" fill="#080812"/><rect x="98" y="44" width="2" height="2" fill="#b0b0ba"/></g>
  <g id="pressed-bottom"><rect x="100" y="44" width="40" height="4" fill="#080812"/><rect x="100" y="44" width="40" height="2" fill="#f6f4fa"/></g>
  <g id="pressed-bottomright"><rect x="140" y="44" width="4" height="4" fill="#080812"/><path d="M140 47h3v-3" fill="none" stroke="#f6f4fa"/></g>

  <!-- Focus: cyan keyboard-navigation overlay. -->
  <g id="focus-topleft"><rect x="144" width="4" height="4" fill="#27dcec"/><rect x="145" y="1" width="3" height="3" fill="#080812"/></g>
  <g id="focus-top"><rect x="148" width="40" height="2" fill="#27dcec"/></g>
  <g id="focus-topright"><rect x="188" width="4" height="4" fill="#27dcec"/><rect x="188" y="1" width="3" height="3" fill="#080812"/></g>
  <g id="focus-left"><rect x="144" y="4" width="2" height="40" fill="#27dcec"/></g>
  <rect id="focus-center" x="148" y="4" width="40" height="40" fill="#27dcec" opacity=".08"/>
  <g id="focus-right"><rect x="190" y="4" width="2" height="40" fill="#27dcec"/></g>
  <g id="focus-bottomleft"><rect x="144" y="44" width="4" height="4" fill="#27dcec"/><rect x="145" y="44" width="3" height="3" fill="#080812"/></g>
  <g id="focus-bottom"><rect x="148" y="46" width="40" height="2" fill="#27dcec"/></g>
  <g id="focus-bottomright"><rect x="188" y="44" width="4" height="4" fill="#27dcec"/><rect x="188" y="44" width="3" height="3" fill="#080812"/></g>

  <rect id="normal-hint-top-margin" width="1" height="5" fill="#000"/>
  <rect id="normal-hint-right-margin" width="5" height="1" fill="#000"/>
  <rect id="normal-hint-bottom-margin" width="1" height="5" fill="#000"/>
  <rect id="normal-hint-left-margin" width="5" height="1" fill="#000"/>
</svg>
